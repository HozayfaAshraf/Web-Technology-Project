<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1><a href="AdminDashboard.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="AdminDashboard.html">Dashboard</a></li>
                <li><a href="#"
                        onclick="sessionStorage.removeItem('username'); sessionStorage.removeItem('role'); window.location.href='Homepage.html';">Log
                        out</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>
        <section class="form-container">
            <h2>Edit Task Details</h2>

            <form action="AdminDashboard.html" method="GET">
                <fieldset>
                    <legend>Modify Task</legend>

                    <div>
                        <label for="taskId">Task ID:</label><br>
                        <input type="number" id="taskId" name="taskId" readonly>
                    </div>
                    <br>

                    <div>
                        <label for="taskTitle">Task Title:</label><br>
                        <input type="text" id="taskTitle" name="taskTitle" required>
                    </div>
                    <br>

                    <div>
                        <label for="teacherName">Assigned Teacher:</label><br>
                        <select id="teacherName" name="teacherName" required>
                        </select>
                    </div>
                    <br>

                    <div>
                        <label for="priority">Priority Level:</label><br>
                        <select id="priority" name="priority" required>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high" selected>High</option>
                        </select>
                    </div>
                    <br>

                    <div>
                        <label for="description">Task Description:</label><br>
                        <textarea id="description" name="description" rows="5" cols="40" required></textarea>
                    </div>

                    <br>

                </fieldset>

                <br>

                <div class="form-actions">
                    <button type="submit">Save Changes</button>
                    <a href="AdminDashboard.html"><button type="button" class="btn-cancel">Cancel</button></a>
                </div>
            </form>
        </section>
    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        if (!sessionStorage.getItem("username")) {
            window.location.href = "Login.html";
        }

        document.addEventListener("DOMContentLoaded", function () {

            //load teacher to the drop down menu
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let select = document.getElementById("teacherName");

            users.forEach(function (user) {
                if (user.role === "teacher") {
                    let option = document.createElement("option");
                    option.value = user.username;
                    option.textContent = user.username;
                    select.appendChild(option);
                }
            });

            let taskId = localStorage.getItem("editTaskId");
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let task = tasks.find(function (t) {
                return String(t.id) === String(taskId);
            });

            if (task) {

                document.getElementById("taskId").value = task.id;
                document.getElementById("taskTitle").value = task.title;
                document.getElementById("teacherName").value = task.teacher;
                document.getElementById("priority").value = task.priority;
                document.getElementById("description").value = task.description;

            }

        });

        document.querySelector('form').addEventListener('submit', function (e) {

            e.preventDefault(); //Prevent form from submitting

            let taskId = localStorage.getItem("editTaskId");
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            tasks = tasks.map(function (task) {
                if (String(task.id) === String(taskId)) {
                    task.title = document.getElementById("taskTitle").value;
                    task.teacher = document.getElementById("teacherName").value;
                    task.priority = document.getElementById("priority").value;
                    task.description = document.getElementById("description").value;
                }
                return task;
            });

            localStorage.setItem("tasks", JSON.stringify(tasks));
            localStorage.removeItem("editTaskId");
            window.location.href = "AdminDashboard.html";

        });


    </script>

</body>

</html>
