<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1><a href="Homepage.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Homepage.html">Home</a></li>
                <li><a href="Login.html">Log in</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>

        <h2>Create an Account</h2>

        <form action="Login.html" method="POST">

            <fieldset>
                <legend><strong>Account Information</strong></legend>

                <div>
                    <label for="username">Username:</label><br>
                    <input type="text" id="username" name="username" placeholder="e.g., hozayfa_ashraf" required
                        autofocus>
                </div>
                <br>

                <div>
                    <label for="email">Email Address:</label><br>
                    <input type="email" id="email" name="email" placeholder="hoz@gmail.com" required>
                </div>
                <br>

                <div>
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" name="password" placeholder="Minimum 8 characters"
                        minlength="8" required>
                </div>
                <br>

                <div>
                    <label for="confirm_password">Confirm Password:</label><br>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Re-enter your password" minlength="8" required>
                </div>
            </fieldset>

            <br>

            <fieldset>
                <legend><strong>Role Selection</strong></legend>
                <p>Please select your role in the system:</p>

                <div>
                    <input type="radio" id="role_admin" name="is_admin" value="True" required>
                    <label for="role_admin">School Admin</label>
                </div>
                <div>
                    <input type="radio" id="role_teacher" name="is_admin" value="False" required>
                    <label for="role_teacher">Teacher</label>
                </div>
            </fieldset>

            <br>

            <div>
                <button type="submit">Complete Sign Up</button>
                <button type="reset">Clear Form</button>
            </div>
        </form>

        <br>

        <p><small>Already have an account? <a href="Login.html">Log in here</a>.</small></p>

        <div id="alert-overlay">
            <div id="alert-box">
                <p class = "alert-message"></p> <br />
                <button type="button" id="btn-close" class="btn-close">Close</button>
            </div>
        </div>

    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        document.querySelector("form").addEventListener("submit", function (e) {

            e.preventDefault(); //Prevent form from submitting and refreshing the page (the default action method)

            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirm_password").value;
            let role = document.querySelector('input[name="is_admin"]:checked').value;

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let found = users.find(function (u) {
                return u.username === username || u.email === email;
            });

            if (found) {
                document.querySelector(".alert-message").textContent = "Username or email already exists. Please choose a different one.";
                document.getElementById('alert-overlay').style.display = 'block';
                document.getElementById('alert-box').style.display = 'block';
                return; // Stop further execution if user already exists
            }

            if (password !== confirmPassword) {
                document.querySelector(".alert-message").textContent = "Passwords do not match. Please try again.";
                document.getElementById('alert-overlay').style.display = 'block';
                document.getElementById('alert-box').style.display = 'block';
                return; // Stop further execution if passwords do not match
            }

            let user = {
                username: username,
                email: email,
                password: password,
                role: role === "True" ? "admin" : "teacher"
            };

            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));

            window.location.href = "Login.html"; //direct to login page

        });

        document.getElementById('btn-close').addEventListener('click', function () {
            document.getElementById('alert-overlay').style.display = 'none';
            document.getElementById('alert-box').style.display = 'none';
        });

    </script>

</body>

</html>
