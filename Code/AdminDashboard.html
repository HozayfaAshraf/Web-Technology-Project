<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1><a href="AdminDashboard.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="#"
                        onclick="sessionStorage.removeItem('username'); sessionStorage.removeItem('role'); window.location.href='Homepage.html';">Log
                        out</a></li>
            </ul>
        </nav>

    </header>

    <hr>

    <main>

        <h2>Admin Dashboard</h2>

        <table>
            <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Title</th>
                    <th>Assigned To</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Description</th>
                    <th id="actions">Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Task rows will be dynamically inserted here -->
            </tbody>

        </table>

        <a href="AddTask.html" class="btn btn-addtask">+ Add New Task</a>
    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        if (!sessionStorage.getItem("username")) {
            window.location.href = "Login.html";
        }

        document.addEventListener("DOMContentLoaded", function () {

            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let tbody = document.querySelector("tbody");

            tasks.forEach(function (task) {

                let row =
                    `<tr>
                    <td>${task.id}</td>
                    <td>${task.title}</td>
                    <td>${task.teacher}</td>
                    <td class="priority-${task.priority.toLowerCase()}">${task.priority}</td>
                    <td>${task.status}</td>
                    <td>${task.description}</td>
                    <td class = "action-data">
                        <a href="EditTask.html" class="btn btn-edit btn-primary" data-id="${task.id}">Edit</a> 
                        <a href="#" class="btn btn-delete" data-id="${task.id}">Delete</a>
                    </td>
                `;

                tbody.innerHTML += row;

            });


        });

        document.querySelector("tbody").addEventListener("click", function (e) {

            if (e.target.classList.contains("btn-delete")) {

                e.preventDefault();

                //filter out deleted task and save back to localStorage
                let taskId = e.target.getAttribute("data-id");
                let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                tasks = tasks.filter(function (task) {
                    return String(task.id) !== String(taskId);
                });

                localStorage.setItem("tasks", JSON.stringify(tasks));
                location.reload();

            }
            else if (e.target.classList.contains("btn-edit")) {
                let taskId = e.target.getAttribute("data-id");
                localStorage.setItem("editTaskId", taskId);
            }

        });

    </script>

</body>

</html>
