<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1><a href="TeacherDashboard.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="CompletedTasks.html">Completed Tasks</a></li>
                <li><a href="#"
                        onclick="sessionStorage.removeItem('username'); sessionStorage.removeItem('role'); window.location.href='Homepage.html';">Log
                        out</a></li>
            </ul>
        </nav>

    </header>

    <hr>

    <main>

        <h2>Teacher Dashboard</h2>

        <form>

            <div class="search-bar">
                <input type="text" name="search" placeholder="Search tasks..." class="search">
                <select id="sort" name="sort" class="sort">
                    <option value="" disabled selected>Sort by...</option>
                    <option value="priority">Priority</option>
                    <option value="status">Status</option>
                </select>
            </div>
            <button type="submit">Search</button>

        </form>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Description</th>
                    <th id="actions">Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        if (!sessionStorage.getItem("username")) {
            window.location.href = "Login.html";
        }

        document.addEventListener("DOMContentLoaded", function () {

            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let tbody = document.querySelector("tbody");
            let username = sessionStorage.getItem("username");

            tasks.forEach(function (task) {

                let row =
                    `<tr>
                    <td>${task.id}</td>
                    <td>${task.title}</td>
                    <td class="priority-${task.priority.toLowerCase()}">${task.priority}</td>
                    <td>${task.status}</td>
                    <td>${task.description}</td>
                    <td class="actions-data">
                            <a href="ViewTask.html" class="btn btn-view btn-primary" data-id="${task.id}">View</a>
                            <a href="#" class="btn btn-complete" data-id="${task.id}">Complete</a>
                    </td>
                `;

                if (task.teacher === username && task.status != "Completed") {
                    tbody.innerHTML += row;
                }

            });


        });

        document.querySelector("tbody").addEventListener("click", function (e) {

            if (e.target.classList.contains("btn-complete")) {

                e.preventDefault();

                //filter out completed task and save back to localStorage
                let taskId = e.target.getAttribute("data-id");
                let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                tasks = tasks.map(function (task) {
                    if (String(task.id) === String(taskId)) {
                        task.status = "Completed";
                    }
                    return task;
                });

                localStorage.setItem("tasks", JSON.stringify(tasks));
                location.reload();

            }
            else if (e.target.classList.contains("btn-view")) {
                let taskId = e.target.getAttribute("data-id");
                localStorage.setItem("viewTaskId", taskId);
            }

        });
        document.querySelector("form").addEventListener("submit", function (e) {

            e.preventDefault();

            let searchTerm = document.querySelector(".search").value.toLowerCase();
            let sortOption = document.querySelector(".sort").value;
            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let tbody = document.querySelector("tbody");
            tbody.innerHTML = "";

            if (sortOption) {
                tasks.sort(function (a, b) {
                    if (a[sortOption] < b[sortOption]) return -1;
                    if (a[sortOption] > b[sortOption]) return 1;
                    return 0;
                });
            }

            tasks.forEach(function (task) {
                if ((task.title.toLowerCase().includes(searchTerm) || task.description.toLowerCase().includes(searchTerm)) && task.teacher === sessionStorage.getItem("username") && task.status != "Completed") {
                    let row = `<tr>
                <td>${task.id}</td>
                <td>${task.title}</td>
                <td class="priority-${task.priority.toLowerCase()}">${task.priority}</td>
                <td>${task.status}</td>
                <td>${task.description}</td>
                <td class="actions-data">
                    <a href="ViewTask.html" class="btn btn-view btn-primary" data-id="${task.id}">View</a>
                    <a href="#" class="btn btn-complete" data-id="${task.id}">Complete</a>
                </td>
            </tr>`;
                    tbody.innerHTML += row;
                }
            });
        });

    </script>

</body>

</html>
