<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Task</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1><a href="TeacherDashboard.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="TeacherDashboard.html">Dashboard</a></li>
                <li><a href="#"
                        onclick="sessionStorage.removeItem('username'); sessionStorage.removeItem('role'); window.location.href='Homepage.html';">Log
                        out</a></li>
            </ul>
        </nav>
    </header>
    <hr>
    <main>
        <section class="form-container">
            <h2>View Task Details</h2>

            <fieldset>

                <div id="fetch-section">
                    <label for="searchId">Enter Task ID to view:</label>
                    <input type="number" id="searchId" placeholder="e.g. 101">
                    <button type="button" class="btn btn-primary"
                        onclick='loadTask(document.getElementById("searchId").value)'>Load Task</button>
                </div>

            </fieldset>

            <div id="task-content">
                <fieldset>
                    <legend><strong>Task Information</strong></legend>
                    <p><strong>ID:</strong> <span id="v-id"></span></p>
                    <p><strong>Title:</strong> <span id="v-title"></span></p>
                    <p><strong>Status:</strong> <span id="v-status"></span></p>
                    <p><strong>Priority:</strong> <span id="v-priority"></span></p>
                    <p><strong>Description:</strong></p>
                    <p id="v-desc" style="background:#f9f9f9; padding:10px; border-left:3px solid #007bff;"></p>
                </fieldset>
            </div>
            <br>
            <p id="error-msg">Task ID not found in system.</p>
        </section>
    </main>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        if (!sessionStorage.getItem("username")) {
            window.location.href = "Login.html";
        }

        function loadTask(id) {

            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let task = tasks.find(function (t) {
                return String(t.id) === String(id);
            });

            if (task) {

                document.getElementById("task-content").style.display = "block";
                document.getElementById("error-msg").style.display = "none";
                document.getElementById("v-id").textContent = task.id;
                document.getElementById("v-title").textContent = task.title;
                document.getElementById("v-status").textContent = task.status;
                document.getElementById("v-desc").textContent = task.description;

                let prio = document.getElementById("v-priority");
                prio.textContent = task.priority; //get priority
                prio.className = "priority-" + task.priority.toLowerCase(); //apply color
            }
            else {
                document.getElementById("task-content").style.display = "none";
                document.getElementById("error-msg").style.display = "block";
            }
        }

        document.addEventListener("DOMContentLoaded", function () {

            let taskId = localStorage.getItem("viewTaskId");

            if (taskId) {

                loadTask(taskId);

                localStorage.removeItem("viewTaskId");

            }

        });
    </script>
</body>

</html>
