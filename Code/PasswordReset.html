<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1><a href="Homepage.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Homepage.html">Home</a></li>
                <li><a href="Signup.html">Sign up</a></li>
                <li><a href="Login.html">Log in</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>
        <section class="form-container">
            <h2>Reset Your Password</h2>

            <form id="reset-form">
                <fieldset>
                    <legend><strong>Account Verification</strong></legend>

                    <div>
                        <label for="username">Username:</label><br>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required
                            autofocus>
                    </div>
                    <br>

                    <div>
                        <label for="new_password">New Password:</label><br>
                        <input type="password" id="new_password" name="new_password" placeholder="Minimum 8 characters"
                            minlength="8" required>
                    </div>
                    <br>

                    <div>
                        <label for="confirm_password">Confirm New Password:</label><br>
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="Re-enter your new password" minlength="8" required>
                    </div>
                </fieldset>

                <br>

                <div class="form-actions">
                    <button type="submit">Update Password</button>
                    <a href="Login.html"><button type="button" class="btn-cancel">Cancel</button></a>
                </div>
            </form>

            <!-- alert for failure -->
            <div id="alert-overlay">
                <div id="alert-box">
                    <p id="alert-message"></p> <br/>
                    <button type="button" id="btn-close" class="btn-close">Close</button>
                </div>
            </div>

            <!-- alert for sucess -->
             <div id="alert-overlay-success">
                <div id="alert-box-success">
                    <p id="alert-message-success"></p> <br/>
                    <button type="button" id="btn-complete" class="btn-complete">Close</button>
                </div>
            </div>

        </section>
    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();

            let username = document.getElementById('username').value;
            let newPassword = document.getElementById('new_password').value;
            let confirmPassword = document.getElementById('confirm_password').value;

            if (newPassword !== confirmPassword) {

                document.getElementById('alert-message').textContent = "Passwords do not match. Please try again.";
                document.getElementById('alert-overlay').style.display = 'block';
                document.getElementById('alert-box').style.display = 'block';

                return;

            }

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let userIndex = users.findIndex(function (u) {
                return u.username === username;
            });

            if (userIndex !== -1) {
                // Update password
                users[userIndex].password = newPassword;
                localStorage.setItem("users", JSON.stringify(users));

                document.getElementById('alert-message-success').textContent = "Password successfully reset! You will now be redirected to Login.";
                document.getElementById('alert-overlay-success').style.display = 'block';
                document.getElementById('alert-box-success').style.display = 'block';

                setTimeout(function () {
                    window.location.href = "Login.html";
                }, 2000); //wait 2 seconds then redirect
            }
            else {

                document.getElementById('alert-message').textContent = "Username not found in our system.";
                document.getElementById('alert-overlay').style.display = 'block';
                document.getElementById('alert-box').style.display = 'block';

            }

        });

        document.getElementById('btn-close').addEventListener('click', function () {

            document.getElementById('alert-overlay').style.display = 'none';
            document.getElementById('alert-box').style.display = 'none';

        });
    </script>
</body>

</html>
