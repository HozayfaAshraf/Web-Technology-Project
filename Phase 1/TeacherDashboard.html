<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1><a href="TeacherDashboard.html">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="CompletedTasks.html">Completed Tasks</a></li>
                <li><a href="#" onclick="localStorage.removeItem('username'); localStorage.removeItem('role'); window.location.href='Homepage.html';">Log out</a></li>
            </ul>
        </nav>

    </header>

    <hr>

    <main>

        <h2>Teacher Dashboard</h2>

        <form>

            <input type="text" name="search" placeholder="Search tasks..." class="search">
            <label for="sort">Sort by:</label>
            <select id="sort" name="sort" class="sort">
                <option value="priority">Priority</option>
                <option value="status">Status</option>
            </select>
            <button type="submit">Search</button>

        </form>

        <br>

        <table>
            <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Description</th>
                    <th id="actions">Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        document.addEventListener("DOMContentLoaded", function () {

            let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
            let tbody = document.querySelector("tbody");
            let username = localStorage.getItem("username");

            tasks.forEach(function (task) {

                let row =
                    `<tr>
                    <td>${task.id}</td>
                    <td>${task.title}</td>
                    <td class="priority-${task.priority.toLowerCase()}">${task.priority}</td>
                    <td>${task.status}</td>
                    <td>${task.description}</td>
                    <td class="actions-data">
                            <a href="ViewTask.html" class="btn btn-view" data-id="${task.id}">View</a>
                            <a href="#" class="btn btn-complete" data-id="${task.id}">Complete</a>
                    </td>
                `;

                if (task.teacher === username && task.status != "Completed") {
                    tbody.innerHTML += row;
                }

            });


        });

        document.querySelector("tbody").addEventListener("click", function (e) {

            if (e.target.classList.contains("btn-complete")) {

                e.preventDefault();

                //filter out completed task and save back to localStorage
                let taskId = e.target.getAttribute("data-id");
                let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                tasks = tasks.map(function (task) {
                    if (String(task.id) === String(taskId)) {
                        task.status = "Completed";
                    }
                    return task;
                });

                localStorage.setItem("tasks", JSON.stringify(tasks));
                location.reload();

            }

        });

    </script>

</body>

</html>
