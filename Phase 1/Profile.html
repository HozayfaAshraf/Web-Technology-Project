<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1><a href="#">School Task Portal</a></h1>
        <nav>
            <ul>
                <li><a href="#" id="dashboard-link">Dashboard</a></li>
                <li><a href="#" onclick="localStorage.removeItem('username'); localStorage.removeItem('role'); window.location.href='Homepage.html';">Log out</a></li>
            </ul>
        </nav>

    </header>

    <hr>

    <main>

        <h2>My Profile</h2>

        <fieldset>
            <legend>Account Details</legend>
            <p id="profile-username"></p>
            <br>
            <p id="profile-email"></p>
            <br>
            <p id="profile-role"></p>
        </fieldset>

    </main>

    <hr>

    <footer>
        <p class="copyrights"><small>&copy; 2026 School Task Portal. All rights reserved.</small></p>
    </footer>

    <script>

        document.addEventListener("DOMContentLoaded", function() {

            let username = localStorage.getItem('username');
            let role = localStorage.getItem('role');
            let dashboard = role === "admin" ? "AdminDashboard.html" : "TeacherDashboard.html";

            document.querySelector("header h1 a").href = dashboard;
            document.getElementById("dashboard-link").href = dashboard;

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(function(u) {
                return u.username === username;
            })

            if (user)
            {

                let role1 = user.role === "admin" ? "School Admin" : "Teacher";

                document.getElementById("profile-username").innerHTML = `<strong>Username: </strong> ${user.username}`;
                document.getElementById("profile-email").innerHTML = `<strong>Email: </strong> ${user.email}`;
                document.getElementById("profile-role").innerHTML = `<strong>Role: </strong> ${role1}`;
            }

        });

    </script>

</body>

</html>
